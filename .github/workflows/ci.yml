name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Smoke tests
        run: npm run smoke

      - name: Typecheck + build
        run: npm run build

      - name: Brand isolation scan
        run: npm run brand-scan

  accessibility-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build production application
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Functional E2E desktop
        run: npm run e2e:run:desktop

      - name: Functional E2E mobile
        run: npm run e2e:run:mobile

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
